---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">

<head>
  {% include head.html %}
  {% include head/custom.html %}
</head>

<body>

  {% include browser-upgrade.html %}
  {% include masthead.html %}

  {{ content }}

  <div class="page__footer">
    <footer>
      {% include footer/custom.html %}
      {% include footer.html %}
    </footer>
  </div>

  {% include scripts.html %}

  <!-- Scroll-to-top button -->
  <button id="scroll-to-top" aria-label="Scroll to top" title="Back to top">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script>
    // Scroll-to-top
    (function () {
      var btn = document.getElementById('scroll-to-top');
      window.addEventListener('scroll', function () {
        btn.classList.toggle('visible', window.scrollY > 300);
      });
      btn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();

    // Animate elements on scroll
    (function () {
      var targets = document.querySelectorAll('.stat-card, .skill-section, .experience-card, .highlight-box');
      if (!targets.length || !('IntersectionObserver' in window)) return;
      targets.forEach(function (el) { el.classList.add('animate-on-scroll'); });
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('animated');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      targets.forEach(function (el) { observer.observe(el); });
    })();
  </script>

</body>

</html>
