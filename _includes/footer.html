{% include base_path %}

<div class="page__footer-copyright">
  &copy; {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}.
  {% if site.author.github %}
  <a href="http://github.com/{{ site.author.github }}" aria-label="GitHub"><i class="fab fa-github"
      aria-hidden="true"></i></a>
  {% endif %}
  {% if site.author.linkedin %}
  <a href="https://www.linkedin.com/in/{{ site.author.linkedin }}" aria-label="LinkedIn"><i class="fab fa-linkedin"
      aria-hidden="true"></i></a>
  {% endif %}
  {% if site.author.googlescholar %}
  <a href="{{ site.author.googlescholar }}" aria-label="Google Scholar"><i class="fas fa-graduation-cap"
      aria-hidden="true"></i></a>
  {% endif %}
</div>
